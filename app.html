<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpendWise - Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      .loader-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #0d1527;
        background-image: radial-gradient(at 0% 0%, hsla(210, 81%, 60%, 0.12) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(230, 90%, 70%, 0.12) 0, transparent 50%);
        display: flex;
        justify-content: center; align-items: center;
        z-index: 9999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
        font-family: 'Outfit', sans-serif;
      }
      .loader-content {
        text-align: center;
      }
      .loader-logo-wrap {
        position: relative;
        width: 80px; height: 80px;
        margin: 0 auto 1.5rem;
      }
      .loader-logo {
        width: 100%; height: 100%;
        animation: float 3s ease-in-out infinite;
      }
      .loader-spinner {
        position: absolute;
        top: -8px; left: -8px; right: -8px; bottom: -8px;
        border: 3px solid transparent;
        border-top-color: #3b82f6;
        border-right-color: #f472b6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-text {
        color: #f1f5f9;
        font-size: 1.15rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        margin: 0;
        background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: textGlow 2s ease-in-out infinite alternate;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes textGlow { from { opacity: 0.7; } to { opacity: 1; filter: brightness(1.2); } }
    </style>
</head>

<body>
    <!-- Loading Screen Overlay -->
    <div id="loader" class="loader-overlay">
      <div class="loader-content">
        <div class="loader-logo-wrap">
          <img src="assets/logo2.svg" alt="SpendWise Logo" class="loader-logo">
          <div class="loader-spinner"></div>
        </div>
        <p class="loader-text">Securing your vault...</p>
      </div>
    </div>
    
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
